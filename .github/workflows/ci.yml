name: CI + SonarCloud

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      PYTHONPATH: ./crime-api

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f crime-api/requirements.txt ]; then pip install -r crime-api/requirements.txt; fi

      - name: Run tests with coverage
        run: |
          pytest crime-api/test_main.py --cov=crime-api --cov-report=xml:coverage.xml --cov-report=term
          echo "Files in repo root:"
          ls -la

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
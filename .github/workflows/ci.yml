name: CI + SonarCloud

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crime_map_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d crime_map_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: crime_map_test
      DB_USER: postgres
      DB_PASSWORD: postgres

    defaults:
      run:
        working-directory: crime-api

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov uvicorn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import socket, time
          host = "127.0.0.1"
          port = 5432
          for _ in range(30):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print("Postgres is ready")
                      break
              except OSError:
                  time.sleep(2)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml:../coverage.xml --cov-report=term

      - name: Check coverage file
        run: |
          echo "Files in crime-api:"
          ls -la
          echo "Files in repo root:"
          ls -la ..
          echo "coverage.xml preview:"
          head -n 20 ../coverage.xml

      - name: Start API
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 8

      - name: Prepare ZAP workspace
        run: |
          mkdir -p ../zap-output
          chmod -R 777 ../zap-output

      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/zap-output:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:8000 -r zap-report.html -w zap-report.md -J zap-report.json -a -I

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-output/*

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io